name: ci

on:
  pull_request:
  push:
    branches: [dev, main]

# Cancel in-flight runs on the same ref so a force-push or rebase
# doesn't leave behind a stale queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Single-purpose validation: confirm the lockfile installs cleanly on a
  # fresh runner. Catches PRs that edit pyproject.toml without updating
  # uv.lock (and vice versa). The repo has no test/lint/build commands
  # (see CLAUDE.md), so this is intentionally the whole job.
  validate:
    name: Validate uv lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version-file: .python-version
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: uv sync (frozen)
        run: uv sync --frozen